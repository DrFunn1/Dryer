<?xml version="1.0" encoding="UTF-8"?>
<svg width="81.28mm" height="128.5mm" viewBox="0 0 81.28 128.5"
     xmlns="http://www.w3.org/2000/svg">

  <!-- Panel background -->
  <rect width="81.28" height="128.5" fill="#1e1e1e"/>
  <rect width="81.28" height="128.5" fill="none" stroke="#111" stroke-width="0.4"/>

  <!-- Mounting holes -->
  <circle cx="7.5"   cy="3"     r="1.6" fill="#111" stroke="#333" stroke-width="0.3"/>
  <circle cx="73.78" cy="3"     r="1.6" fill="#111" stroke="#333" stroke-width="0.3"/>
  <circle cx="7.5"   cy="125.5" r="1.6" fill="#111" stroke="#333" stroke-width="0.3"/>
  <circle cx="73.78" cy="125.5" r="1.6" fill="#111" stroke="#333" stroke-width="0.3"/>

  <!-- ============================================================ -->
  <!-- TOP ROW: 4 output jacks  Y=18.5mm                          -->
  <!-- CLK=18  TRG=33  CV=48  MIDI=63                             -->
  <!-- ============================================================ -->

  <text x="18"  y="12.5" text-anchor="middle" font-family="Arial" font-size="3" font-weight="bold" fill="#aaa" letter-spacing="0.3">CLK</text>
  <text x="33"  y="12.5" text-anchor="middle" font-family="Arial" font-size="3" font-weight="bold" fill="#aaa" letter-spacing="0.3">TRG</text>
  <text x="48"  y="12.5" text-anchor="middle" font-family="Arial" font-size="3" font-weight="bold" fill="#aaa" letter-spacing="0.3">CV</text>
  <text x="63"  y="12.5" text-anchor="middle" font-family="Arial" font-size="3" font-weight="bold" fill="#ffe66d" letter-spacing="0.3">MIDI</text>

  <circle cx="18"  cy="18.5" r="3.2" fill="#111" stroke="#555" stroke-width="0.3"/>
  <circle cx="33"  cy="18.5" r="3.2" fill="#111" stroke="#555" stroke-width="0.3"/>
  <circle cx="48"  cy="18.5" r="3.2" fill="#111" stroke="#555" stroke-width="0.3"/>
  <!-- MIDI jack: yellow ring + USB-B rect hint -->
  <circle cx="63"  cy="18.5" r="3.2" fill="#111" stroke="#ffe66d" stroke-width="0.4"/>
  <rect   x="60.3" y="17.2" width="5.4" height="2.6" rx="0.6"
          fill="none" stroke="#ffe66d" stroke-width="0.2" opacity="0.5"/>

  <!-- ============================================================ -->
  <!-- BUTTONS  Y=30.5mm   MOON=9   LINT=72.5                     -->
  <!-- ============================================================ -->

  <circle cx="9"    cy="30.5" r="4"   fill="#2a2a2a" stroke="#a8e6cf" stroke-width="0.4"/>
  <circle cx="9"    cy="30.5" r="1.6" fill="#00cc44" stroke="#00ff88" stroke-width="0.25"/>
  <text   x="9"    y="38.5"  text-anchor="middle" font-family="Arial" font-size="2.8" fill="#a8e6cf" letter-spacing="0.2">MOON</text>

  <circle cx="72.5" cy="30.5" r="4"   fill="#2a2a2a" stroke="#ffd3b6" stroke-width="0.4"/>
  <circle cx="72.5" cy="30.5" r="1.6" fill="#00cc44" stroke="#00ff88" stroke-width="0.25"/>
  <text   x="72.5" y="38.5"  text-anchor="middle" font-family="Arial" font-size="2.8" fill="#ffd3b6" letter-spacing="0.2">LINT</text>

  <!-- ============================================================ -->
  <!-- DISPLAY  cx=40.64  cy=54.5  r=18.542mm                     -->
  <!-- ============================================================ -->
  <circle cx="40.64" cy="54.5" r="18.542" fill="#0a0a0a" stroke="#00ff88" stroke-width="0.6"/>
  <circle cx="40.64" cy="54.5" r="17.8"   fill="none"   stroke="#1a3a1a" stroke-width="0.2"/>

  <!-- ============================================================ -->
  <!-- KNOBS  Y=76.5mm                                             -->
  <!-- SPEED=10  SIZE=25  NUMBER=56  HEIGHT=71                    -->
  <!-- ============================================================ -->

  <circle cx="10"  cy="76.5" r="4.2" fill="#2a2a2a" stroke="#555" stroke-width="0.3"/>
  <circle cx="25"  cy="76.5" r="4.2" fill="#2a2a2a" stroke="#555" stroke-width="0.3"/>
  <circle cx="56"  cy="76.5" r="4.2" fill="#2a2a2a" stroke="#555" stroke-width="0.3"/>
  <circle cx="71"  cy="76.5" r="4.2" fill="#2a2a2a" stroke="#555" stroke-width="0.3"/>

  <!-- Knob labels (below knobs, above CV jacks) -->
  <text x="10"  y="84" text-anchor="middle" font-family="Arial" font-size="2.5" fill="#888" letter-spacing="0.1">SPEED</text>
  <text x="25"  y="84" text-anchor="middle" font-family="Arial" font-size="2.5" fill="#888" letter-spacing="0.1">SIZE</text>
  <text x="56"  y="84" text-anchor="middle" font-family="Arial" font-size="2.3" fill="#888" letter-spacing="0.1">NUMBER</text>
  <text x="71"  y="84" text-anchor="middle" font-family="Arial" font-size="2.5" fill="#888" letter-spacing="0.1">HEIGHT</text>

  <!-- ============================================================ -->
  <!-- CV INPUT JACKS  Y=94.5mm                                    -->
  <!-- ============================================================ -->

  <circle cx="10"  cy="94.5" r="3.2" fill="#111" stroke="#4ecdc4" stroke-width="0.3"/>
  <circle cx="25"  cy="94.5" r="3.2" fill="#111" stroke="#4ecdc4" stroke-width="0.3"/>
  <circle cx="56"  cy="94.5" r="3.2" fill="#111" stroke="#4ecdc4" stroke-width="0.3"/>
  <circle cx="71"  cy="94.5" r="3.2" fill="#111" stroke="#4ecdc4" stroke-width="0.3"/>

  <text x="10"  y="100" text-anchor="middle" font-family="Arial" font-size="2.2" fill="#4ecdc4" opacity="0.8">CV</text>
  <text x="25"  y="100" text-anchor="middle" font-family="Arial" font-size="2.2" fill="#4ecdc4" opacity="0.8">CV</text>
  <text x="56"  y="100" text-anchor="middle" font-family="Arial" font-size="2.2" fill="#4ecdc4" opacity="0.8">CV</text>
  <text x="71"  y="100" text-anchor="middle" font-family="Arial" font-size="2.2" fill="#4ecdc4" opacity="0.8">CV</text>

  <!-- ============================================================ -->
  <!-- GROUP LABELS below CV jacks                                  -->
  <!-- ============================================================ -->

  <line x1="4"  y1="104.5" x2="31" y2="104.5" stroke="#333" stroke-width="0.25"/>
  <line x1="50" y1="104.5" x2="77" y2="104.5" stroke="#333" stroke-width="0.25"/>

  <text x="17.5" y="109"  text-anchor="middle" font-family="Arial" font-size="3.2" font-weight="bold" fill="#00ff88" letter-spacing="1.2">DRUM</text>
  <text x="63.5" y="109"  text-anchor="middle" font-family="Arial" font-size="3.2" font-weight="bold" fill="#00ff88" letter-spacing="1.2">VANES</text>

  <!-- ============================================================ -->
  <!-- TITLE                                                        -->
  <!-- ============================================================ -->
  <text x="40.64" y="120.5" text-anchor="middle" font-family="Arial" font-size="6.5"
        font-weight="bold" fill="#00ff88" letter-spacing="2.5">DRYER</text>
  <text x="40.64" y="125"   text-anchor="middle" font-family="Arial" font-size="2"
        fill="#444" letter-spacing="0.8">DRFUNN</text>

</svg>
